# ============================================================================
# EvilTwin Production NGINX Configuration
# ============================================================================
# TLS CERTIFICATES REQUIRED:
#   Place fullchain.pem and privkey.pem in ./infra/nginx/certs/
#   Generate self-signed for testing:
#     mkdir -p infra/nginx/certs
#     openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#       -keyout infra/nginx/certs/privkey.pem \
#       -out infra/nginx/certs/fullchain.pem \
#       -subj "/CN=localhost"
#   For production, use Let's Encrypt or your CA of choice.
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript text/xml;

    # Rate limiting zone for API endpoints
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # -------------------------------------------------------------------------
    # Upstream: FastAPI backend
    # -------------------------------------------------------------------------
    upstream backend {
        server backend:8000;
    }

    # -------------------------------------------------------------------------
    # Upstream: Vite / React static files
    # -------------------------------------------------------------------------
    upstream frontend {
        server frontend:3000;
    }

    # -------------------------------------------------------------------------
    # HTTP → redirect to HTTPS in production
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS server
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Content-Type-Options    "nosniff"                   always;
        add_header X-Frame-Options           "SAMEORIGIN"                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection          "1; mode=block"             always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:" always;

        # -----------------------------------------------------------------
        # API proxy
        # -----------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # -----------------------------------------------------------------
        # WebSocket proxy for live alerts
        # -----------------------------------------------------------------
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        # -----------------------------------------------------------------
        # Health check bypass (no rate limiting)
        # -----------------------------------------------------------------
        location = /health {
            proxy_pass http://backend;
        }

        # -----------------------------------------------------------------
        # Frontend (React SPA)
        # -----------------------------------------------------------------
        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
        }
    }
}
