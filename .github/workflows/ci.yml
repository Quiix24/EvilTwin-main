name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Backend: lint + test
  # --------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eviltwin_test
          POSTGRES_USER: eviltwin
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd "pg_isready -U eviltwin -d eviltwin_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: eviltwin_test
      POSTGRES_USER: eviltwin
      POSTGRES_PASSWORD: testpassword
      TEST_DATABASE_URL: "postgresql+asyncpg://eviltwin:testpassword@localhost:5432/eviltwin_test"
      SECRET_KEY: ci-test-secret-key-not-for-production
      CANARY_WEBHOOK_SECRET: ci-test-canary-secret
      ALGORITHM: HS256
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Run tests
        run: pytest -v --tb=short

  # --------------------------------------------------------------------------
  # Frontend: lint + test + build
  # --------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # SDN controller: lint + test
  # --------------------------------------------------------------------------
  sdn:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdn
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdn/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v --tb=short

  # --------------------------------------------------------------------------
  # Docs site: build validation
  # --------------------------------------------------------------------------
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

  # --------------------------------------------------------------------------
  # Docker Compose: validate configs build
  # --------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose configs
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
