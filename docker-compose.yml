services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: eviltwin-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eviltwin}
      POSTGRES_USER: ${POSTGRES_USER:-eviltwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - eviltwin-net
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eviltwin} -d ${POSTGRES_DB:-eviltwin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # SSH Gateway — AI Pre-Screen + Routing Decision
  # For real client IPs on Windows, run .\gateway\run-native.ps1 instead.
  # ============================================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: eviltwin-gateway
    environment:
      BACKEND_URL: ${GATEWAY_BACKEND_URL:-http://backend:8000}
      SDN_REST_URL: ${SDN_REST_URL:-http://ryu:8080}
      ROUTING_API_KEY: ${ROUTING_API_KEY:-}
      REAL_SSH_HOST: ${REAL_SSH_HOST:-dummy-real}
      REAL_SSH_PORT: ${REAL_SSH_PORT:-22}
      REAL_SSH_USER: ${REAL_SSH_USER:-real}
      REAL_SSH_PASSWORD: ${REAL_SSH_PASSWORD:-eviltwin}
      HONEYPOT_HOST: ${GATEWAY_HONEYPOT_HOST:-cowrie}
      HONEYPOT_PORT: ${GATEWAY_HONEYPOT_PORT:-2222}
      AUTH_COLLECT_WINDOW_S: ${AUTH_COLLECT_WINDOW_S:-5.0}
      BACKEND_TIMEOUT: ${GATEWAY_BACKEND_TIMEOUT:-2.0}
      GATEWAY_LISTEN_PORT: "22"
      HOST_KEY_PATH: /etc/eviltwin/ssh_host_rsa_key
    volumes:
      - gateway-hostkey:/etc/eviltwin
    networks:
      - eviltwin-net
      - deception-net
    ports:
      - "${GATEWAY_PORT:-22}:22"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ============================================================================
  # Cowrie SSH Honeypot
  # ============================================================================
  cowrie:
    build:
      context: ./honeypots/cowrie
      dockerfile: Dockerfile
    container_name: eviltwin-cowrie
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      - cowrie-downloads:/cowrie/var/lib/cowrie/downloads
    networks:
      - deception-net
      - honeypot-ingress
    # Loopback-only: attackers must traverse the SSH gateway (real IP is
    # preserved + un-masked there). The native gateway reaches it at 127.0.0.1:2222.
    ports:
      - "2222:2222"
    restart: unless-stopped

  # ============================================================================
  # Dionaea Multi-Protocol Honeypot
  # ============================================================================
  dionaea:
    build:
      context: ./honeypots/dionaea
      dockerfile: Dockerfile
    container_name: eviltwin-dionaea
    volumes:
      - dionaea-logs:/opt/dionaea/var/log
      - dionaea-captures:/opt/dionaea/var/lib/dionaea/binaries
    networks:
      - deception-net
      - honeypot-ingress
    ports:
      - "${DIONAEA_FTP_PORT:-2121}:21"
      - "${DIONAEA_HTTP_PORT:-8081}:80"
      - "${DIONAEA_SMB_PORT:-1445}:445"
      - "${DIONAEA_MSSQL_PORT:-11433}:1433"
    restart: unless-stopped

  # ============================================================================
  # SDN Controller (Ryu)
  # ============================================================================
  ryu:
    build:
      context: ./sdn
      dockerfile: Dockerfile
    container_name: eviltwin-ryu
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      HONEYPOT_IP: ${HONEYPOT_IP:-10.0.2.10}
      THREAT_REDIRECT_THRESHOLD: ${THREAT_REDIRECT_THRESHOLD:-2}
    networks:
      - eviltwin-net
    ports:
      - "127.0.0.1:6633:6633"
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  # ============================================================================
  # Backend API (FastAPI)
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eviltwin-backend
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-eviltwin}
      POSTGRES_USER: ${POSTGRES_USER:-eviltwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RYU_REST_URL: ${RYU_REST_URL:-http://ryu:8080}
      HONEYPOT_IP: ${HONEYPOT_IP:-10.0.2.10}
      THREAT_REDIRECT_THRESHOLD: ${THREAT_REDIRECT_THRESHOLD:-2}
      MODEL_PATH: ${MODEL_PATH:-/app/ai/model.pkl}
      SCORE_CACHE_TTL: ${SCORE_CACHE_TTL:-300}
      IPINFO_TOKEN: ${IPINFO_TOKEN:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      SPLUNK_HEC_URL: ${SPLUNK_HEC_URL:-}
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:-}
      CANARY_WEBHOOK_SECRET: ${CANARY_WEBHOOK_SECRET:?CANARY_WEBHOOK_SECRET is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      CANARY_WEBHOOK_TOLERANCE_SECONDS: ${CANARY_WEBHOOK_TOLERANCE_SECONDS:-300}
      PRE_SESSION_MODEL_PATH: ${PRE_SESSION_MODEL_PATH:-/app/ai/pre_session_model.pkl}
      REAL_NET_CIDR: ${REAL_NET_CIDR:-10.0.1.0/24}
      GATEWAY_WHITELIST_CIDRS: ${GATEWAY_WHITELIST_CIDRS:-}
      PENTEST_CIDRS: ${PENTEST_CIDRS:-}
      SERVICE_ACCOUNT_USERNAME_PATTERNS: ${SERVICE_ACCOUNT_USERNAME_PATTERNS:-}
      ROUTING_API_KEY: ${ROUTING_API_KEY:-}
      ROUTING_BYPASS_IPS: ${ROUTING_BYPASS_IPS:-127.0.0.1,::1}
      DEMO_BOOTSTRAP: ${DEMO_BOOTSTRAP:-true}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-analyst@eviltwin.local}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-eviltwin-demo}
      DEMO_USER_ROLE: ${DEMO_USER_ROLE:-analyst}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cowrie-logs:/logs/cowrie:ro
      - dionaea-logs:/logs/dionaea:ro
    networks:
      - eviltwin-net
      - deception-net
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================================
  # React Frontend Dashboard
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eviltwin-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws/alerts}
    networks:
      - eviltwin-net
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ============================================================================
  # Splunk Universal Forwarder (disabled - use HEC via backend instead)
  # To re-enable, uncomment below or see splunk/ directory for config files.
  # ============================================================================
  # splunk-forwarder:
  #   build:
  #     context: ./splunk
  #   container_name: eviltwin-splunk-fwd
  #   privileged: true
  #   environment:
  #     SPLUNK_START_ARGS: "--accept-license"
  #     SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
  #     SPLUNK_PASSWORD: ${SPLUNK_HEC_TOKEN:-changeme123}
  #     SPLUNK_HOME_OWNERSHIP_ENFORCEMENT: "false"
  #   volumes:
  #     - cowrie-logs:/cowrie/var/log/cowrie:ro
  #   networks:
  #     - eviltwin-net
  #   restart: unless-stopped

  # ============================================================================
  # Splunk Enterprise (SIEM + HEC receiver)
  # Web UI: http://localhost:18000  |  admin / eviltwin-demo
  # HEC:    http://splunk-ent:8088  (token auto-created at startup)
  # ============================================================================
  splunk-ent:
    image: splunk/splunk:latest
    container_name: eviltwin-splunk-ent
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_PASSWORD: eviltwin-demo
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:-be411c42-caf0-49f8-9ffe-cae1be99e0d9}
      SPLUNK_HEC_SSL: "false"
      SPLUNK_DISABLE_POPUPS: "true"
      SPLUNK_APPS_URL: ""
    volumes:
      - splunk-etc:/opt/splunk/etc
      - splunk-var:/opt/splunk/var
      - ./splunk-apps/eviltwin_index:/opt/splunk/etc/apps/eviltwin_index
    networks:
      - eviltwin-net
    ports:
      - "127.0.0.1:18000:8000"
      - "127.0.0.1:18088:8088"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/en-US/account/login"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 300s

  # ============================================================================
  # Splunk HEC Mock Receiver — collects events forwarded by the backend
  # ============================================================================
  splunk-hec:
    build:
      context: ./splunk-hec-mock
      dockerfile: Dockerfile
    container_name: eviltwin-splunk-hec
    environment:
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:-be411c42-caf0-49f8-9ffe-cae1be99e0d9}
    volumes:
      - splunk-data:/data
    networks:
      - eviltwin-net
    ports:
      - "127.0.0.1:8089:8088"
    restart: unless-stopped

  # ============================================================================
  # Tripwire Service - Bait files exposed via HTTP + inotify file watcher
  # ============================================================================
  tripwire:
    build: ./tripwires
    container_name: eviltwin-tripwire
    ports:
      - "8082:8080"
    environment:
      CANARY_WEBHOOK_URL: http://backend:8000/webhook/canary
      CANARY_WEBHOOK_SECRET: ${CANARY_WEBHOOK_SECRET}
      CANARY_TOKEN_ID: ${TRIPWIRE_TOKEN_ID:-}
      TOKEN_MAP: ${TRIPWIRE_TOKEN_MAP:-{}}
      WATCH_DIR: /bait
      COOLDOWN_SECONDS: "30"
      TRIPWIRE_HTTP_PORT: "8080"
    volumes:
      - ./tripwires/bait:/bait
    networks:
      - eviltwin-net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # Dummy Real Server — shows "You are a normal user" for real decisions
  # SSH (22): shows Ubuntu banner + terminal prompt
  # HTTP (8080): shows authenticated web page
  # ============================================================================
  dummy-real:
    build: ./dummy-real
    container_name: eviltwin-dummy-real
    environment:
      REAL_SSH_USER: ${REAL_SSH_USER:-gateway}
      REAL_SSH_PASSWORD: ${REAL_SSH_PASSWORD:-gateway}
      LISTEN_PORT: "22"
      HTTP_PORT: "8080"
    networks:
      - eviltwin-net
    ports:
      - "127.0.0.1:8022:22"
      - "127.0.0.1:8088:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ============================================================================
  # HTTP Gateway — per-IP routing (real vs honeypot) for HTTP traffic.
  # Same pattern as SSH gateway: queries backend routing table, proxies to
  # dummy-real:8080 for legitimate users, serves deceptive page for attackers.
  # ============================================================================
  http-gateway:
    build: ./http-gateway
    container_name: eviltwin-http-gw
    environment:
      ROUTING_BACKEND_URL: ${ROUTING_BACKEND_URL:-http://backend:8000}
      REAL_HTTP_URL: ${REAL_HTTP_URL:-http://dummy-real:8080}
      HTTP_GATEWAY_PORT: "80"
      ROUTING_API_KEY: ${ROUTING_API_KEY:-}
      INGEST_BACKEND_URL: ${INGEST_BACKEND_URL:-http://backend:8000}
      REAL_HTTP_USER: ${REAL_HTTP_USER:-real}
      REAL_HTTP_PASSWORD: ${REAL_HTTP_PASSWORD:-eviltwin}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - eviltwin-net
    ports:
      - "${HTTP_GATEWAY_PORT:-8888}:80"
    depends_on:
      backend:
        condition: service_healthy
      dummy-real:
        condition: service_healthy
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  eviltwin-net:
    driver: bridge
    name: eviltwin-net

  honeypot-ingress:
    driver: bridge
    name: eviltwin-honeypot-ingress

  deception-net:
    driver: bridge
    name: deception-net
    internal: true

# ============================================================================
# Volumes
# ============================================================================
volumes:
  pgdata:
    name: eviltwin-pgdata
  cowrie-logs:
    name: eviltwin-cowrie-logs
  cowrie-downloads:
    name: eviltwin-cowrie-downloads
  dionaea-logs:
    name: eviltwin-dionaea-logs
  dionaea-captures:
    name: eviltwin-dionaea-captures
  gateway-hostkey:
    name: eviltwin-gateway-hostkey
  splunk-data:
    name: eviltwin-splunk-data
  splunk-etc:
    name: eviltwin-splunk-etc
  splunk-var:
    name: eviltwin-splunk-var
