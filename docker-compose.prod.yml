version: '3.9'

# Production overlay — run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Requires Docker Compose v2.24.0+ for !reset tag support (removes inherited ports)

services:
  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  backend:
    restart: always
    ports: !reset []
    environment:
      LOG_LEVEL: WARNING
      DEBUG: "false"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  ryu:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    ports: !reset []
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  nginx:
    image: nginx:1.25-alpine
    container_name: eviltwin-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    networks:
      - eviltwin-net
    ports:
      - "443:443"
      - "80:80"
    restart: always
    depends_on:
      - backend
      - frontend
