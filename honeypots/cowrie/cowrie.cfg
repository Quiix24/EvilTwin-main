[honeypot]
hostname = prod-web-01
log_path = /cowrie/var/log/cowrie
download_path = /cowrie/var/lib/cowrie/downloads
interact_enabled = true
auth_class = UserDB

[output_jsonlog]
logfile = /cowrie/cowrie-git/var/log/cowrie/cowrie.json
epoch_timestamp = true

[ssh]
enabled = true
listen_port = 22
version = SSH-2.0-OpenSSH_7.4

[telnet]
enabled = false

[backend_pool]
enabled = false

[fs]
class = filesystem.HoneyPotFilesystem

