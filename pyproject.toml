[tool.ruff]
target-version = "py311"
line-length = 120
src = ["backend", "sdn"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "S",     # bandit (security)
    "B",     # bugbear
    "A",     # builtins shadowing
    "T20",   # print statements
    "SIM",   # simplify
]
ignore = [
    "S101",  # assert usage OK in tests
    "S105",  # hardcoded password bindings (false positives in config)
    "S106",  # hardcoded password arguments (false positives in tests)
    "B008",  # function call in default arg (Depends() pattern)
    "A003",  # class attribute shadowing builtin (id, type, etc.)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101", "S105", "S106"]
"**/migrations/**" = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["backend/tests", "sdn/tests"]
filterwarnings = [
    "ignore::DeprecationWarning",
]
